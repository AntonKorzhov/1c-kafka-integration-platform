name: one-c-integration

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-integration}
      POSTGRES_USER: ${POSTGRES_USER:-integration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_OWNERSHIP_TOPIC: ${KAFKA_OWNERSHIP_TOPIC:-1c.ownership_forms.v1}
      KAFKA_COUNTERPARTIES_TOPIC: ${KAFKA_COUNTERPARTIES_TOPIC:-1c.counterparties.v1}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-1c.integration.dlq.v1}
    entrypoint: ["/bin/bash", "-ec"]
    # `bash -c` получает сценарий ровно одним аргументом. Скаляр command
    # Docker Compose разбирает на слова, поэтому здесь необходима YAML-последовательность.
    command:
      - |
        for topic in "$${KAFKA_OWNERSHIP_TOPIC}" "$${KAFKA_COUNTERPARTIES_TOPIC}" "$${KAFKA_DLQ_TOPIC}"; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$${KAFKA_BOOTSTRAP_SERVERS}" --create --if-not-exists --topic "$${topic}" --partitions 1 --replication-factor 1
        done

  integration-service:
    build:
      context: .
      dockerfile: integration-service/Dockerfile
    env_file: .env
    environment:
      HEALTH_PORT: 8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./test-results:/test-results
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: ["python", "-m", "app.http_server"]

  consumer-service:
    build:
      context: .
      dockerfile: consumer-service/Dockerfile
    env_file: .env
    environment:
      HEALTH_PORT: 8081
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./test-results:/test-results
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: ["python", "-m", "app.consumer"]

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  pgadmin:
    image: dpage/pgadmin4:9.16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?Set PGADMIN_DEFAULT_EMAIL in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Set PGADMIN_DEFAULT_PASSWORD in .env}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  loki:
    image: grafana/loki:3.7
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:v1.17.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    ports:
      - "12345:12345"

  grafana:
    image: grafana/grafana:13.1-slim
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:?Set GF_SECURITY_ADMIN_USER in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  pgadmin_data:
  loki_data:
  grafana_data:
